<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 70" width="100%" height="100%" fill="none">
  <!-- ICON SEGMENT (Scaled and translated) -->
  <g transform="translate(5, 5) scale(0.6)">
    <!-- Flow Lines -->
    <g stroke="#C97A3D" stroke-width="5" stroke-linecap="round">
      <path d="M 28 32 L 40 32" />
      <circle cx="20" cy="32" r="3" fill="#E89A3D" />
      <path d="M 20 48 L 40 48" stroke="#E89A3D" />
      <circle cx="12" cy="48" r="3" fill="#C97A3D" />
      <path d="M 26 64 L 40 64" />
      <circle cx="18" cy="64" r="3" fill="#E89A3D" />
    </g>

    <!-- 'P' Contour -->
    <path d="M 45 80 L 45 22 L 72 22 L 86 35 L 86 53 L 72 66 L 45 66" 
          stroke="#C97A3D" 
          stroke-width="7" 
          stroke-linejoin="round" 
          stroke-linecap="round" />

    <!-- Inside curly braces {} -->
    <text x="65" y="52" 
          font-family="JetBrains Mono, ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" 
          font-size="22" 
          font-weight="900" 
          fill="#E89A3D" 
          text-anchor="middle" 
          alignment-baseline="middle">{}</text>
  </g>

  <!-- WORDMARK & TYPOGRAPHY -->
  <!-- "Payloada" Brand Name -->
  <text x="75" y="38" 
        font-family="Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" 
        font-size="26" 
        font-weight="800" 
        fill="#F9FAFB" 
        letter-spacing="-0.02em">Payloada</text>

  <!-- Subtitle: "JSON & API PAYLOAD WORKSPACE" -->
  <text x="76" y="52" 
        font-family="Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" 
        font-size="7.5" 
        font-weight="700" 
        fill="#C97A3D" 
        letter-spacing="0.16em">JSON &amp; API PAYLOAD WORKSPACE</text>
</svg>
